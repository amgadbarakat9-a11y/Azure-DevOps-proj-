name: Terraform

on:
  workflow_dispatch:
    inputs:
      action:
        description: "Choose action"
        required: true
        default: "plan"

concurrency:
  group: terraform-prod
  cancel-in-progress: false

jobs:
  terraform:
    runs-on: ubuntu-latest
    env:
      TF_VAR_subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: |
            {
              "clientId": "${{ secrets.AZURE_CLIENT_ID }}",
              "clientSecret": "${{ secrets.AZURE_CLIENT_SECRET }}",
              "subscriptionId": "${{ secrets.AZURE_SUBSCRIPTION_ID }}",
              "tenantId": "${{ secrets.AZURE_TENANT_ID }}"
            }

      - uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Force Unlock Any Stale Lock  
        run: |
          LOCK_ID=$(terraform providers lock 2>&1 | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' | head -1)
          if terraform plan -var-file="prod.tfvars" 2>&1 | grep -oP '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' > /tmp/lock_id; then
            echo "No lock found"
          else
            LOCK_ID=$(cat /tmp/lock_id)
            [ -n "$LOCK_ID" ] && terraform force-unlock -force $LOCK_ID && echo
          fi
        continue-on-error: true

      - name: Terraform Plan
        if: ${{ inputs.action == 'plan' }}
        run: terraform plan -var-file="prod.tfvars"

      - name: Terraform Apply
        if: ${{ inputs.action == 'apply' }}
        run: terraform apply -var-file="prod.tfvars" -auto-approve